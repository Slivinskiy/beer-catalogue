apiVersion: apps/v1
kind: Deployment
metadata:
  name: beer-catalogue
  namespace: beer-catalogue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beer-catalogue
  template:
    metadata:
      labels:
        app: beer-catalogue
    spec:
      containers:
        - name: beer-catalogue
          image: beer-catalogue:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: aws
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: beer-catalogue-db
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: beer-catalogue-db
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: beer-catalogue-db
                  key: SPRING_DATASOURCE_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
